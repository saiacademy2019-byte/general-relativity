<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>General Relativity — Intuitive Lecture Notes</title>

  <!-- Light theme base -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Auth gate ────────────────────────────────────────────── */
    #auth-gate {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Inter', sans-serif;
    }

    #auth-gate h2 {
      color: #1a1a2e;
      font-size: 1.5em;
      font-weight: 700;
      margin-bottom: 0.3em;
    }

    #auth-gate .subtitle {
      color: #555;
      margin-bottom: 1.5em;
      font-size: 0.95em;
      text-align: center;
      max-width: 300px;
    }

    #auth-gate input {
      border: 1.5px solid #ccc;
      border-radius: 6px;
      padding: 0.55em 1em;
      font-size: 1em;
      width: 260px;
      outline: none;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
    }

    #auth-gate input:focus {
      border-color: #5a189a;
    }

    #auth-gate button {
      margin-top: 0.8em;
      background: #5a189a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.55em 1.8em;
      font-size: 1em;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      width: 260px;
    }

    #auth-gate button:hover { background: #9d4edd; }
    #auth-gate button:disabled { background: #aaa; cursor: default; }

    #auth-gate .error {
      color: #c0392b;
      font-size: 0.88em;
      margin-top: 0.5em;
      min-height: 1.2em;
    }

    #auth-gate .info {
      color: #555;
      font-size: 0.88em;
      margin-top: 0.5em;
    }

    #otp-step { display: none; flex-direction: column; align-items: center; }
  </style>

  <style>
    /* ── Base colours ─────────────────────────────────────────── */
    body, .app-nav, nav.app-nav {
      background: #ffffff;
      color: #111111;
      font-family: 'Inter', sans-serif;
    }

    .sidebar {
      background: #f7f7f7;
      border-right: 1px solid #e0e0e0;
    }

    .content {
      background: #ffffff;
    }

    /* ── Typography ───────────────────────────────────────────── */
    .markdown-section {
      color: #111111;
      font-size: 17px;
      line-height: 1.75;
      max-width: 860px;
    }

    .markdown-section h1 {
      color: #111;
      font-size: 2.2em;
      font-weight: 700;
      border-bottom: 2px solid #111;
      padding-bottom: 0.3em;
    }

    .markdown-section h2 {
      color: #1a1a2e;
      font-size: 1.7em;
      font-weight: 700;
      border-bottom: 2px solid #5a189a;
      padding-bottom: 0.2em;
      margin-top: 2em;
    }

    .markdown-section h3 {
      color: #3d0066;
      font-size: 1.25em;
      font-weight: 600;
      margin-top: 1.6em;
    }

    .markdown-section h4 {
      color: #555;
      font-size: 1.05em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .markdown-section p, .markdown-section li {
      color: #222;
    }

    .markdown-section strong { color: #111; }

    .markdown-section a { color: #5a189a; }
    .markdown-section a:hover { color: #9d4edd; }

    /* ── Blockquotes ──────────────────────────────────────────── */
    .markdown-section blockquote {
      background: #f3eeff;
      border-left: 4px solid #9d4edd;
      color: #333;
      padding: 0.8em 1.2em;
      border-radius: 0 6px 6px 0;
      margin: 1.2em 0;
    }

    /* ── Tables ───────────────────────────────────────────────── */
    .markdown-section table {
      display: table;
      width: 100%;
      border-collapse: collapse;
    }

    .markdown-section th {
      background: #5a189a;
      color: #fff;
      padding: 0.5em 0.9em;
      font-weight: 600;
    }

    .markdown-section td {
      padding: 0.45em 0.9em;
      border-bottom: 1px solid #e0e0e0;
      color: #222;
    }

    .markdown-section tr:nth-child(even) td {
      background: #f9f6ff;
    }

    /* ── Code blocks ──────────────────────────────────────────── */
    .markdown-section code {
      background: #f0ecff;
      color: #5a189a;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .markdown-section pre code {
      background: none;
      color: inherit;
    }

    /* ── Images — full width, prominent ──────────────────────── */
    .markdown-section img {
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5em 0;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    /* ── Horizontal rules ─────────────────────────────────────── */
    .markdown-section hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 2.5em 0;
    }

    /* ── Sidebar nav ──────────────────────────────────────────── */
    .sidebar .sidebar-nav a {
      color: #333;
    }

    .sidebar .sidebar-nav a:hover,
    .sidebar .sidebar-nav .active {
      color: #5a189a;
    }

    /* ── Search box ───────────────────────────────────────────── */
    .search input {
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #111;
    }
  </style>
</head>
<body>
  <div id="auth-gate">
    <!-- Step 1: email -->
    <div id="email-step" style="display:flex;flex-direction:column;align-items:center;">
      <h2>General Relativity</h2>
      <p class="subtitle">Enter your student email to receive an access code.</p>
      <input type="email" id="email-input" placeholder="you@student.education.wa.edu.au" autofocus />
      <button id="send-btn" onclick="sendOTP()">Send Code</button>
      <div class="error" id="email-error"></div>
    </div>

    <!-- Step 2: OTP -->
    <div id="otp-step">
      <h2>Check your email</h2>
      <p class="subtitle" id="otp-subtitle">Enter the 6-digit code sent to your inbox.</p>
      <input type="text" id="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" />
      <button id="verify-btn" onclick="verifyOTP()">Verify</button>
      <div class="error" id="otp-error"></div>
      <div class="info" id="otp-info"></div>
      <button style="margin-top:1em;background:none;color:#5a189a;border:none;cursor:pointer;font-size:0.9em;width:auto;padding:0;" onclick="backToEmail()">← Use a different email</button>
    </div>
  </div>

  <div id="app" style="display:none">Loading…</div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    (function () {
      var SERVICE_ID  = 'general_relativity_site';
      var TEMPLATE_ID = 'template_ys83p3a';
      var PUBLIC_KEY  = 'G7clP1wSojTHtZauY';
      var DOMAIN      = 'student.education.wa.edu.au';
      var WHITELIST   = ['saiacademy2019@gmail.com'];
      var OTP_TTL_MS  = 10 * 60 * 1000;

      var _otp = null;
      var _otpExpiry = null;
      var _email = null;

      emailjs.init({ publicKey: PUBLIC_KEY });

      if (sessionStorage.getItem('gr_auth') === '1') { unlock(); }

      function unlock() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('app').style.display = '';
      }

      function setError(id, msg) { document.getElementById(id).textContent = msg; }
      function clearError(id)    { document.getElementById(id).textContent = ''; }

      window.sendOTP = function () {
        var email = document.getElementById('email-input').value.trim().toLowerCase();
        clearError('email-error');

        if (!email.endsWith('@' + DOMAIN) && WHITELIST.indexOf(email) === -1) {
          setError('email-error', 'Must be a @' + DOMAIN + ' address.');
          return;
        }

        _otp    = String(Math.floor(100000 + Math.random() * 900000));
        _expiry = Date.now() + OTP_TTL_MS;
        _email  = email;

        var expiryTime = new Date(_expiry).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        var btn = document.getElementById('send-btn');
        btn.disabled = true;
        btn.textContent = 'Sending…';

        emailjs.send(SERVICE_ID, TEMPLATE_ID, {
          to_email: email,
          otp:      _otp,
          time:     expiryTime,
        }).then(function () {
          document.getElementById('email-step').style.display = 'none';
          var otpStep = document.getElementById('otp-step');
          otpStep.style.display = 'flex';
          document.getElementById('otp-subtitle').textContent =
            'Enter the 6-digit code sent to ' + email + '.';
          document.getElementById('otp-input').focus();
        }, function (err) {
          console.error('EmailJS error:', JSON.stringify(err));
          setError('email-error', 'Error: ' + (err && err.text ? err.text : JSON.stringify(err)));
          btn.disabled = false;
          btn.textContent = 'Send Code';
        });
      };

      window.verifyOTP = function () {
        clearError('otp-error');
        var entered = document.getElementById('otp-input').value.trim();

        if (Date.now() > _expiry) {
          setError('otp-error', 'Code expired. Please go back and request a new one.');
          return;
        }
        if (entered !== _otp) {
          setError('otp-error', 'Incorrect code. Try again.');
          document.getElementById('otp-input').value = '';
          document.getElementById('otp-input').focus();
          return;
        }

        sessionStorage.setItem('gr_auth', '1');
        unlock();
      };

      window.backToEmail = function () {
        _otp = null; _expiry = null; _email = null;
        document.getElementById('otp-step').style.display = 'none';
        document.getElementById('email-step').style.display = 'flex';
        document.getElementById('send-btn').disabled = false;
        document.getElementById('send-btn').textContent = 'Send Code';
        clearError('email-error');
        document.getElementById('email-input').focus();
      };

      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        if (document.getElementById('otp-step').style.display === 'flex') {
          window.verifyOTP();
        } else {
          window.sendOTP();
        }
      });
    })();
  </script>

  <script>
    window.$docsify = {
      name: 'General Relativity',
      homepage: 'notes.md',
      loadSidebar: false,
      loadNavbar: false,
      maxLevel: 4,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search notes…',
        noData: 'No results.',
      },
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@1.4.4/dist/docsify-katex.js"></script>
</body>
</html>
